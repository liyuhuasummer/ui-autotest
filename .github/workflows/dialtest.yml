name: UI 日常拨测

on:
  schedule:
    # 北京时间每天上午 9:00 (UTC 1:00)
    - cron: '0 1 * * *'
  # 也支持手动触发
  workflow_dispatch:

jobs:
  dialtest:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 安装 Playwright 浏览器
        run: npx playwright install --with-deps chromium

      - name: 创建 .env 配置文件
        run: |
          cat > .env << 'EOF'
          BASE_URL=${{ secrets.BASE_URL }}
          LOGIN_USERNAME=${{ secrets.LOGIN_USERNAME }}
          LOGIN_PASSWORD=${{ secrets.LOGIN_PASSWORD }}
          LOGIN_CAPTCHA=${{ secrets.LOGIN_CAPTCHA }}
          EOF

      - name: 执行拨测
        id: dialtest
        run: npx playwright test --reporter=list,html
        continue-on-error: true

      - name: 上传拨测报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dialtest-report-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          retention-days: 30

      - name: 失败时创建 GitHub Issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const issueTitle = `⚠️ 拨测失败 - ${new Date().toLocaleString('zh-CN', {timeZone: 'Asia/Shanghai'})}`;
            const issueBody = `## 🔴 拨测失败

            **站点:** ${process.env.BASE_URL}
            **时间:** ${new Date().toLocaleString('zh-CN', {timeZone: 'Asia/Shanghai'})}
            **运行编号:** #${context.runNumber}

            ### 失败详情
            请查看运行日志获取详细错误信息:
            [查看运行日志](${runUrl})

            ### 报告下载
            在 Actions 页面下载 artifact 可查看截图和视频回放:
            [下载报告](${runUrl})

            ---
            *此 Issue 由 GitHub Actions 自动创建*`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issueTitle,
              body: issueBody,
              labels: ['dialtest-failure', 'bug']
            });
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
